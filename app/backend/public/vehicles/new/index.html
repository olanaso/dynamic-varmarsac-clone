  <script>(function () {
      const apiBase = "https://app.varmarsac.com";

      window.__VARMAR_API_BASE__ = apiBase;
      window.barmarAuthFetch = function (path, init) {
        init = init || {};
        var headers = new Headers(init.headers || {});
        var t = localStorage.getItem('barmar_token');
        if (t) headers.set('Authorization', 'Bearer ' + t);
        return fetch(window.__VARMAR_API_BASE__ + path, Object.assign({}, init, { headers: headers }));
      };
      window.barmarUploadsUrl = function (file) {
        return window.__VARMAR_API_BASE__ + '/uploads/' + file;
      };

      // ── Searchable select ─────────────────────────────────────────────────
      // Usage: var ss = new SearchableSelect(containerEl, 'Buscar...')
      //   ss.setOptions([{ value, label }])   populate + reset
      //   ss.getValue()                       current selected value (string) or ''
      //   ss.reset()                          clear selection
      window.SearchableSelect = function (container, placeholder) {
        container.innerHTML = '';
        container.style.position = 'relative';

        var input = document.createElement('input');
        input.type = 'text';
        input.placeholder = placeholder || 'Buscar…';
        input.autocomplete = 'off';
        input.className = 'w-full px-3.5 py-2.5 pr-9 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 cursor-pointer bg-white';

        var chevron = document.createElement('span');
        chevron.style.cssText = 'position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:#94a3b8;line-height:0';
        chevron.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>';

        var hidden = document.createElement('input');
        hidden.type = 'hidden';

        var dropdown = document.createElement('div');
        dropdown.style.cssText = 'position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:9999;background:#fff;border:1px solid #e2e8f0;border-radius:0.5rem;box-shadow:0 4px 16px rgba(0,0,0,.1);max-height:192px;overflow-y:auto;display:none';

        container.appendChild(input);
        container.appendChild(chevron);
        container.appendChild(hidden);
        container.appendChild(dropdown);

        var _opts = [];
        var _val = '';
        var _label = '';

        function render(filter) {
          dropdown.innerHTML = '';
          var f = (filter || '').toLowerCase();
          var hits = f ? _opts.filter(function (o) { return o.label.toLowerCase().indexOf(f) !== -1; }) : _opts;
          if (hits.length === 0) {
            var d = document.createElement('div');
            d.style.cssText = 'padding:10px 16px;font-size:.875rem;color:#94a3b8';
            d.textContent = 'Sin resultados';
            dropdown.appendChild(d);
            return;
          }
          hits.forEach(function (o) {
            var d = document.createElement('div');
            var isSel = String(o.value) === String(_val);
            d.style.cssText = 'padding:9px 14px;font-size:.875rem;cursor:pointer;transition:background .1s;' +
              (isSel ? 'background:#eff6ff;color:#1d4ed8;font-weight:600' : 'color:#334155');
            d.textContent = o.label;
            d.addEventListener('mouseover', function () { if (!isSel) d.style.background = '#f8fafc'; });
            d.addEventListener('mouseout', function () { if (!isSel) d.style.background = ''; });
            d.addEventListener('mousedown', function (e) {
              e.preventDefault();
              _val = o.value; _label = o.label;
              hidden.value = o.value;
              input.value = o.label;
              dropdown.style.display = 'none';
            });
            dropdown.appendChild(d);
          });
        }

        input.addEventListener('focus', function () {
          if (input.value === _label) input.value = '';
          render(input.value);
          dropdown.style.display = 'block';
        });
        input.addEventListener('input', function () {
          _val = ''; hidden.value = '';
          render(input.value);
          dropdown.style.display = 'block';
        });
        input.addEventListener('blur', function () {
          setTimeout(function () {
            dropdown.style.display = 'none';
            input.value = _val ? _label : '';
          }, 160);
        });
        // click on input when already focused — re-open
        input.addEventListener('click', function () {
          if (dropdown.style.display === 'none') {
            if (input.value === _label) input.value = '';
            render(input.value);
            dropdown.style.display = 'block';
          }
        });

        return {
          setOptions: function (opts) {
            _opts = opts; _val = ''; _label = '';
            hidden.value = ''; input.value = '';
          },
          getValue: function () { return hidden.value; },
          reset: function () {
            _val = ''; _label = ''; hidden.value = ''; input.value = '';
          },
        };
      };
    })();</script>

  <script>(function () {
      const apiUrl = "https://app.varmarsac.com";

      const API_URL = apiUrl;
      const token = localStorage.getItem('barmar_token');

      if (!token) {
        window.location.href = '/login';
      } else {
        fetch(`${API_URL}/api/auth/me`, {
          headers: { Authorization: `Bearer ${token}` },
        })
          .then((res) => {
            if (!res.ok) throw new Error('invalid token');
            return res.json();
          })
          .then((data) => {
            const user = data?.user ?? {};
            const email = typeof user.email === 'string' ? user.email : '';
            const userName = user.nombre_completo || user.name || user.full_name || (email.includes('@') ? email.split('@')[0] : email) || 'Administrador';
            const userRole = typeof user.role === 'string' ? user.role : 'admin';

            window.__barmarCurrentUserId = user.id ?? null;

            const nameEl = document.getElementById('sidebar-user-name');
            if (nameEl) nameEl.textContent = userName;
          })
          .catch(() => {
            localStorage.removeItem('barmar_token');
            window.location.href = '/login';
          });
      }

      const sidebar = document.getElementById('sidebar');
      const sidebarToggle = document.getElementById('sidebar-toggle');
      const sidebarOverlay = document.getElementById('sidebar-overlay');

      if (sidebar && sidebarToggle && sidebarOverlay) {
        const openSidebar = () => {
          sidebar.classList.remove('-translate-x-full');
          sidebarOverlay.classList.remove('opacity-0', 'pointer-events-none');
          sidebarToggle.setAttribute('aria-expanded', 'true');
        };

        const closeSidebar = () => {
          sidebar.classList.add('-translate-x-full');
          sidebarOverlay.classList.add('opacity-0', 'pointer-events-none');
          sidebarToggle.setAttribute('aria-expanded', 'false');
        };

        sidebarToggle.addEventListener('click', () => {
          const isOpen = !sidebar.classList.contains('-translate-x-full');
          if (isOpen) {
            closeSidebar();
          } else {
            openSidebar();
          }
        });

        sidebarOverlay.addEventListener('click', closeSidebar);

        window.addEventListener('resize', () => {
          if (window.innerWidth >= 768) {
            sidebar.classList.remove('-translate-x-full');
            sidebarOverlay.classList.add('opacity-0', 'pointer-events-none');
            sidebarToggle.setAttribute('aria-expanded', 'false');
          } else {
            sidebar.classList.add('-translate-x-full');
          }
        });
      }
    })();</script>

<script>(function () {
    const VEHICLE_MAX_EQUIPAMIENTO_TAGS = 30;

    (function () {
      function setLoading(btn, isLoading) {
        if (!btn) return;
        if (isLoading) {
          if (!document.getElementById('_bspin')) {
            var s = document.createElement('style');
            s.id = '_bspin';
            s.textContent = '@keyframes _bspin{to{transform:rotate(360deg)}}';
            document.head.appendChild(s);
          }
          btn._origHTML = btn.innerHTML;
          btn.disabled = true;
          btn.style.opacity = '0.7';
          btn.style.cursor = 'not-allowed';
          btn.innerHTML =
            '<svg style="display:inline-block;width:1rem;height:1rem;margin-right:0.4rem;vertical-align:-0.175em;animation:_bspin 1s linear infinite" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle style="opacity:.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path style="opacity:.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>Creando…';
        } else {
          btn.disabled = false;
          btn.style.opacity = '';
          btn.style.cursor = '';
          if (btn._origHTML !== undefined) btn.innerHTML = btn._origHTML;
        }
      }

      function showError(msg) {
        var div = document.getElementById('new-veh-error');
        var span = document.getElementById('new-veh-error-msg');
        if (span) span.textContent = msg;
        if (div) div.classList.remove('hidden');
        if (div) div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      function hideError() {
        var div = document.getElementById('new-veh-error');
        if (div) div.classList.add('hidden');
      }

      function initEquipamientoTags(opts) {
        var tags = Array.isArray(opts.initial) ? opts.initial.slice() : [];
        var input = document.getElementById(opts.inputId);
        var addBtn = document.getElementById(opts.addBtnId);
        var container = document.getElementById(opts.containerId);
        if (!input || !addBtn || !container) return function () { return []; };

        function render() {
          container.innerHTML = '';
          if (!tags.length) {
            container.innerHTML = '<span class="text-xs text-slate-400">Sin etiquetas</span>';
            return;
          }
          tags.forEach(function (tag, idx) {
            var pill = document.createElement('span');
            pill.className = 'inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-emerald-50 border border-emerald-200 text-xs font-medium text-emerald-800';
            var txt = document.createElement('span');
            txt.textContent = tag;
            var rm = document.createElement('button');
            rm.type = 'button';
            rm.className = 'text-emerald-600/70 hover:text-red-600 leading-none px-0.5';
            rm.innerHTML = '&times;';
            rm.addEventListener('click', function () { tags.splice(idx, 1); render(); });
            pill.appendChild(txt);
            pill.appendChild(rm);
            container.appendChild(pill);
          });
        }

        function addTag() {
          var val = (input.value || '').trim();
          if (!val || tags.indexOf(val) !== -1) { input.value = ''; return; }
          if (tags.length >= VEHICLE_MAX_EQUIPAMIENTO_TAGS) return;
          tags.push(val);
          input.value = '';
          render();
        }

        addBtn.addEventListener('click', addTag);
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') { e.preventDefault(); addTag(); }
        });

        render();
        return function () { return tags.slice(); };
      }

      function init() {
        // Set default year
        var yearInput = document.getElementById('f-year');
        if (yearInput && !yearInput.value) yearInput.value = String(new Date().getFullYear());

        // Load categories
        window.barmarAuthFetch('/api/categories?limit=200')
          .then(function (r) { return r.json(); })
          .then(function (j) {
            var cats = j.data || [];
            var sel = document.getElementById('f-catid');
            sel.innerHTML = '<option value="">— Seleccionar —</option>';
            cats.forEach(function (c) {
              var opt = document.createElement('option');
              opt.value = c.id;
              opt.textContent = c.name;
              sel.appendChild(opt);
            });
            if (cats.length === 0) {
              document.getElementById('cat-warn').classList.remove('hidden');
            }
          })
          .catch(function () {
            var sel = document.getElementById('f-catid');
            sel.innerHTML = '<option value="">— Error al cargar —</option>';
          });

        // Load service types
        window.barmarAuthFetch('/api/service-types?limit=200')
          .then(function (r) { return r.json(); })
          .then(function (j) {
            var types = j.data || [];
            var container = document.getElementById('stype-pills');
            container.innerHTML = '';
            if (types.length === 0) {
              container.innerHTML = '<span class="text-xs text-slate-400">Sin tipos disponibles.</span>';
              return;
            }
            types.forEach(function (st) {
              var label = document.createElement('label');
              label.setAttribute('data-pill', '');
              label.className = 'inline-flex items-center gap-1.5 cursor-pointer select-none px-2.5 py-1 rounded-full border text-xs font-medium transition-colors bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100';
              var cb = document.createElement('input');
              cb.type = 'checkbox';
              cb.name = 'service_type_ids';
              cb.value = String(st.id);
              cb.className = 'w-3.5 h-3.5 text-primary-600 border-slate-300 rounded';
              cb.addEventListener('change', function () {
                if (cb.checked) {
                  label.className = 'inline-flex items-center gap-1.5 cursor-pointer select-none px-2.5 py-1 rounded-full border text-xs font-medium transition-colors bg-primary-100 border-primary-300 text-primary-700';
                } else {
                  label.className = 'inline-flex items-center gap-1.5 cursor-pointer select-none px-2.5 py-1 rounded-full border text-xs font-medium transition-colors bg-slate-50 border-slate-200 text-slate-600 hover:bg-slate-100';
                }
              });
              var span = document.createElement('span');
              span.textContent = st.name;
              label.appendChild(cb);
              label.appendChild(span);
              container.appendChild(label);
            });
          })
          .catch(function () {
            document.getElementById('stype-pills').innerHTML = '<span class="text-xs text-slate-400">No se pudieron cargar.</span>';
          });

        var getEquipTags = initEquipamientoTags({
          inputId: 'f-equip-input',
          addBtnId: 'f-equip-add',
          containerId: 'f-equip-tags',
          initial: [],
        });

        // Image preview
        var inp = document.getElementById('inp-image');
        var thumb = document.getElementById('img-thumb');
        if (inp && thumb) {
          inp.addEventListener('change', function () {
            var file = inp.files && inp.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function (e) {
              thumb.innerHTML = '<img src="' + e.target.result + '" class="w-full h-full object-cover" alt="preview" />';
            };
            reader.readAsDataURL(file);
          });
        }

        // Form submit
        var form = document.getElementById('new-veh-form');
        var btn = document.getElementById('btn-submit');

        form.addEventListener('submit', function (e) {
          e.preventDefault();
          hideError();

          var fd = new FormData();
          fd.append('name', document.getElementById('f-name').value);
          fd.append('make', document.getElementById('f-make').value);
          fd.append('registration_number', document.getElementById('f-regnum').value);
          fd.append('year', document.getElementById('f-year').value);
          fd.append('category_id', document.getElementById('f-catid').value);
          fd.append('status', document.getElementById('f-status').value);
          fd.append('daily_rate', document.getElementById('f-rate').value);
          fd.append('precio_mensual', document.getElementById('f-monthly').value);
          fd.append('cantidad_pasajeros', document.getElementById('f-passengers').value);
          fd.append('tipo_transmision', document.getElementById('f-transmission').value);
          fd.append('tipo_combustible', document.getElementById('f-fuel').value);
          fd.append('tipo_traccion', document.getElementById('f-traction').value);
          fd.append('current_mileage', document.getElementById('f-km').value);
          fd.append('description', document.getElementById('f-desc').value);
          fd.append('is_approved', document.getElementById('f-approved').checked ? 'true' : 'false');
          fd.append('homologado', document.getElementById('f-homologado').checked ? 'true' : 'false');

          var kmMaint = document.getElementById('f-km-maint').value;
          if (kmMaint && kmMaint.trim()) fd.append('kilometraje_mantenimiento', kmMaint);

          document.querySelectorAll('[name="service_type_ids"]:checked').forEach(function (cb) {
            fd.append('service_type_ids', cb.value);
          });

          if (getEquipTags) {
            var equipTags = getEquipTags();
            if (!equipTags.length) {
              fd.append('equipamiento', '[]');
            } else {
              equipTags.forEach(function (tag) {
                fd.append('equipamiento', tag);
              });
            }
          }

          var imageFile = inp && inp.files && inp.files[0];
          if (imageFile) fd.append('image', imageFile, imageFile.name);

          setLoading(btn, true);

          window.barmarAuthFetch('/api/admin/vehicles', { method: 'POST', body: fd })
            .then(function (res) {
              if (res.status === 401) { window.location.href = '/login'; return; }
              return res.json().then(function (data) {
                if (!res.ok) {
                  var errs = data.errors;
                  showError(errs ? errs.map(function (e) { return e.message; }).join(' · ') : (data.message || 'No se pudo crear el vehículo.'));
                  setLoading(btn, false);
                  return;
                }
                window.location.href = '/vehicles';
              });
            })
            .catch(function (err) {
              showError(err.message || 'Error de red.');
              setLoading(btn, false);
            });
        });
      }

      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
      else init();
    })();
  })();</script>
